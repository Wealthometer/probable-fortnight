name: Daily Mini Project Generator

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate project
        run: |
          DATE=$(date +"%Y-%m-%d")
          DIR="projects/project-$DATE"

          mkdir -p "$DIR"

          RANDOM_INDEX=$((RANDOM % 3))

          if [ "$RANDOM_INDEX" -eq 0 ]; then
            echo '// Password Generator
function generatePassword(length = 12) {
  const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  return Array.from({ length }, () => chars[Math.floor(Math.random() * chars.length)]).join("");
}
console.log(generatePassword());' > "$DIR/index.js"

          elif [ "$RANDOM_INDEX" -eq 1 ]; then
            echo '// Todo App
let todos = ["Learn JS", "Build project"];
todos.push("Push to GitHub");
console.log(todos);' > "$DIR/index.js"

          else
            echo '// Random Quote
const quotes = ["Code daily", "Stay consistent", "Ship fast"];
console.log(quotes[Math.floor(Math.random() * quotes.length)]);' > "$DIR/index.js"
          fi

          echo "# Project $DATE

Auto-generated mini project.

Run:
node index.js

Generated on $DATE" > "$DIR/README.md"

      - name: Commit and push
        run: |
          git config user.name "YOUR_GITHUB_USERNAME"
          git config user.email "YOUR_EMAIL@users.noreply.github.com"

          git add projects/
          git commit -m "feat: add mini project for $DATE" || exit 0
          git push
